<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>J's Mini Apps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #f9f6f0; /* Warm papyrus base */
      --surface: #ffffff;
      --text:    #2b2b2b;
      --red:     #e63946;
      --gold:    #f4c542;
      --muted:   #666666;
      --line:    rgba(0,0,0,0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      /* CSS Stucco Texture */
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.06'/%3E%3C/svg%3E");
      color: var(--text);
      font-family: 'Lora', serif;
      min-height: 100vh;
    }

    .page {
      position: relative; z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 72px 28px 100px;
    }

    /* ── Header ── */
    header { margin-bottom: 72px; }

    .header-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }

    .logo-eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 10px;
      font-family: sans-serif;
    }

    .logo-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 6vw, 4rem);
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .app-count {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      padding-bottom: 8px;
      font-family: sans-serif;
    }

    .header-rule {
      margin-top: 28px;
      height: 1px;
      background: linear-gradient(90deg, var(--red) 0%, rgba(230,57,70,0.15) 40%, transparent 100%);
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* ── App Card ── */
    .app-card {
      background: var(--card-bg, var(--surface));
      color: var(--card-text, var(--text));
      border: 1.5px solid var(--line);
      border-radius: 16px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
    }

    .app-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--card-accent, var(--red));
      opacity: 0;
      transition: opacity 0.25s;
    }

    .app-card:hover {
      border-color: var(--card-accent, var(--red));
      transform: translateY(-3px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.1);
    }

    .app-card:hover::before { opacity: 1; }

    .card-icon {
      font-size: 2rem;
      line-height: 1;
      user-select: none;
    }

    .card-tag {
      display: inline-block;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--card-accent, var(--red));
      background: color-mix(in srgb, var(--card-accent, var(--red)) 12%, transparent);
      border: 1px solid color-mix(in srgb, var(--card-accent, var(--red)) 30%, transparent);
      border-radius: 100px;
      padding: 4px 12px;
      width: fit-content;
      font-family: sans-serif;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      letter-spacing: 0.01em;
      line-height: 1.2;
    }

    .card-desc {
      font-size: 0.88rem;
      line-height: 1.65;
      color: color-mix(in srgb, var(--card-text, var(--text)) 70%, transparent);
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 4px;
      border-top: 1px solid color-mix(in srgb, var(--card-text, var(--text)) 10%, transparent);
    }

    .card-launch {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--card-accent, var(--red));
      font-weight: 500;
      font-family: sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: gap 0.2s;
    }

    .app-card:hover .card-launch { gap: 10px; }

    .card-arrow {
      font-size: 1rem;
      line-height: 1;
    }

    .card-filename {
      font-size: 0.62rem;
      color: color-mix(in srgb, var(--card-text, var(--text)) 50%, transparent);
      font-family: monospace;
      letter-spacing: 0.02em;
    }

    /* ── Footer ── */
    footer {
      margin-top: 80px;
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div class="header-top">
      <div class="logo-block">
        <div class="logo-eyebrow">Mini Apps</div>
        <div class="logo-title">J's Mini Apps</div>
      </div>
      <div class="app-count" id="appCount"></div>
    </div>
    <div class="header-rule"></div>
  </header>

  <div class="grid" id="grid"></div>

  <footer>J's Mini Apps &nbsp;·&nbsp; GitHub Pages</footer>

</div>

<script>
  const apps = [
    {
      title:  "Q&A Practice Activity",
      desc:   "Classroom randomizer for directing English conversation Q&A sessions. 18 built-in topics, fully customizable with a settings panel.",
      url:    "qa_practice_activity.html",
      icon:   "🎯",
      tag:    "Education",
      accent: "#e63946",
      cardBg: "#000000",
      cardText: "#f0f0f8"
    }
  ];

  /* ── Render ── */
  const grid = document.getElementById('grid');
  const count = document.getElementById('appCount');

  count.textContent = `${apps.length} app${apps.length !== 1 ? 's' : ''}`;

  apps.forEach(app => {
    const card = document.createElement('a');
    card.href = app.url;
    card.className = 'app-card';
    card.style.setProperty('--card-accent', app.accent || '#e63946');
    if (app.cardBg) card.style.setProperty('--card-bg', app.cardBg);
    if (app.cardText) card.style.setProperty('--card-text', app.cardText);
    
    card.innerHTML = `
      <div class="card-icon">${app.icon}</div>
      <div class="card-tag">${app.tag}</div>
      <div class="card-title">${app.title}</div>
      <p class="card-desc">${app.desc}</p>
      <div class="card-footer">
        <span class="card-launch" style="color: var(--card-accent)">Launch <span class="card-arrow">→</span></span>
        <span class="card-filename" style="color: inherit; opacity: 0.5;">${app.url}</span>
      </div>
    `;
    grid.appendChild(card);
  });
</script>
</body>
</html>
